version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: store_ratings_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: store_ratings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
